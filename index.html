<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <title>Document</title>
</head>
<body>

    <!-- Number Buttons -->

    <div class = 'container'>
        
        <div>
            <input type="text" name="display" class="display" id="display" disabled>
        </div>

        <div class = 'allButtons'>
            <div id = "number">
                <button id="1">1</button>
                <button id="2">2</button>
                <button id="3">3</button>
                <button id="4">4</button>
                <button id="5">5</button>
                <button id="6">6</button>
                <button id="7">7</button>
                <button id="8">8</button>
                <button id="9">9</button>
                <button id="0">0</button>
                <button id=".">.</button>


                <p class ="watermark">Created by: frozerated</p>
            </div>
            

        <!-- Operator Buttons -->
            <div id = "operators">
                <button id="plus">+</button>
                <button id="minus">-</button>
                <button id="multiply">*</button>
                <button id="divide">/</button>
                <button id="equals" class = 'stretch_button'>=</button>
                <button id="clear" class = 'stretch_button'>CLEAR</button>
                <button id="backspace" class = 'stretch_button'>DEL</button>
            </div>
        </div>
    </div>
</body>
</html>
